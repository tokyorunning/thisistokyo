<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO RUNNING. - 도쿄를 달리고 기록합니다</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gm-style-iw { border-radius: 20px !important; padding: 0 !important; }
        
        /* Modal Animation */
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-modal { animation: modalEnter 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 1. Firebase Initial Config ---
        // __firebase_config 및 __app_id는 환경에서 제공되거나 기본값을 사용합니다.
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'this-is-tokyo-running';

        // Paths (Rule 1)
        const ROUTES_PATH = `artifacts/${appId}/public/data/routes`;
        const SETTINGS_PATH = `artifacts/${appId}/public/data/settings/global`;

        /**
         * Icon Wrapper: CDN Lucide 아이콘을 리액트에서 안전하게 사용
         */
        const Icon = ({ name, size = 24, className = "", color = "currentColor", fill = "none" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size, color: color, fill: fill }} className={`inline-block align-middle ${className}`}></i>;
        };

        const translations = {
            ko: {
                heroSub: "도쿄를 달리고 기록합니다",
                mapLoading: "러닝 맵을 렌더링하는 중...",
                announcement: "NOTICE",
                allCourses: "RUNNING ROUTES",
                courseSub: "테마별로 큐레이션된 도쿄의 러닝 코스",
                shareTitle: "SHARE THIS ROUTE",
                copyLink: "URL Copy",
                viewOnYoutube: "WATCH ON YOUTUBE",
                copied: "✅ URL이 복사되었습니다!",
                adminOn: "🛠️ Admin Dashboard",
                adminOff: "🛠️ Admin Logout",
                courseStats: { dist: "거리", diff: "난이도" },
                themes: { All: "전체", City: "시티", Nature: "자연", Park: "공원", Night: "야간", Training: "장거리", Morning: "아침", Race: "대회", Overseas: "해외" }
            },
            ja: {
                heroSub: "東京を走り、記録する",
                mapLoading: "マップを読み込み中...",
                announcement: "お知らせ",
                allCourses: "RUNNING ROUTES",
                courseSub: "テーマ別に厳選されたランニングコース",
                shareTitle: "SHARE THIS ROUTE",
                copyLink: "URL Copy",
                viewOnYoutube: "YouTubeで視聴する",
                copied: "✅ URLをコピーしました!",
                adminOn: "🛠️ Admin Dashboard",
                adminOff: "🛠️ Logout",
                courseStats: { dist: "距離", diff: "難易度" },
                themes: { All: "すべて", City: "シティ", Nature: "自然", Park: "公園", Night: "ナイト", Training: "ロング", Morning: "朝", Race: "大会", Overseas: "海外" }
            }
        };

        // --- 별점 컴포넌트 ---
        const StarRating = ({ rating, size = 16, color = "text-orange-500" }) => (
            <div className="flex gap-0.5">
                {[1, 2, 3, 4, 5].map((s) => (
                    <Icon key={s} name="star" size={size} color={s <= rating ? "#f97316" : "#cbd5e1"} fill={s <= rating ? "#f97316" : "none"} />
                ))}
            </div>
        );

        function App() {
            const [lang, setLang] = useState('ko');
            const [routes, setRoutes] = useState([]);
            const [selectedRoute, setSelectedRoute] = useState(null);
            const [activeFilter, setActiveFilter] = useState('All');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [shareMessage, setShareMessage] = useState('');
            const [scrolled, setScrolled] = useState(false);
            
            // 관리자 모드
            const [isAdmin, setIsAdmin] = useState(false); 
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // 구글 지도
            const [googleApiKey, setGoogleApiKey] = useState('');
            const [isMapLoaded, setIsMapLoaded] = useState(false);
            const [mapError, setMapError] = useState('');

            // 데이터 상태
            const [announcement, setAnnouncement] = useState({ text_ko: "데이터 로딩 중...", createdAt: new Date().toISOString() });
            const [isEditingAnnouncement, setIsEditingAnnouncement] = useState(false);
            const [editNoticeText, setEditNoticeText] = useState("");
            const [youtubeUrl, setYoutubeUrl] = useState('');
            const [isFetchingInfo, setIsFetchingInfo] = useState(false);
            const [newRouteForm, setNewRouteForm] = useState({ title: '', location: '', description: '', lat: '', lng: '', videoId: '', thumbnail: '', themes: [], distance: '', difficulty: 3 });

            const mapRef = useRef(null);
            const googleMapInstance = useRef(null);
            const markersRef = useRef([]);
            const t = translations[lang];

            // 1. Auth & Real-time Listeners (Rule 3)
            useEffect(() => {
                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Firebase Login Fail"); }

                    // Listeners
                    db.doc(SETTINGS_PATH).onSnapshot(doc => { if (doc.exists) setAnnouncement(doc.data()); });
                    db.collection(ROUTES_PATH).onSnapshot(snap => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        data.sort((a, b) => new Date(b.date) - new Date(a.date)); // Rule 2: Memory Sort
                        setRoutes(data);
                    });
                };
                init();
                
                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            // 2. Map Script Loading
            useEffect(() => {
                if (googleApiKey && !isMapLoaded) {
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}`;
                    script.async = true;
                    script.onload = () => setIsMapLoaded(true);
                    script.onerror = () => setMapError("Google Maps Key Error");
                    document.head.appendChild(script);
                }
            }, [googleApiKey]);

            // 3. Map Instance
            useEffect(() => {
                if (isMapLoaded && mapRef.current && !googleMapInstance.current) {
                    googleMapInstance.current = new window.google.maps.Map(mapRef.current, {
                        center: { lat: 35.6895, lng: 139.6917 }, zoom: 11,
                        styles: [
                            { featureType: "all", elementType: "labels.text.fill", stylers: [{ color: "#ffffff" }] },
                            { featureType: "landscape", elementType: "all", stylers: [{ color: "#242f3e" }] },
                            { featureType: "water", elementType: "all", stylers: [{ color: "#17263c" }] }
                        ],
                        mapTypeControl: false, streetViewControl: false,
                    });
                }
            }, [isMapLoaded]);

            // 4. Markers
            useEffect(() => {
                if (googleMapInstance.current) {
                    markersRef.current.forEach(m => m.setMap(null));
                    markersRef.current = [];
                    routes.forEach(route => {
                        if (activeFilter !== 'All' && !route.themes.includes(activeFilter)) return;
                        const marker = new window.google.maps.Marker({
                            position: { lat: Number(route.lat), lng: Number(route.lng) },
                            map: googleMapInstance.current,
                            icon: { path: 0, scale: 10, fillColor: selectedRoute?.id === route.id ? "#fb923c" : "#3b82f6", fillOpacity: 1, strokeWeight: 3, strokeColor: "#ffffff" }
                        });
                        marker.addListener('click', () => setSelectedRoute(route));
                        markersRef.current.push(marker);
                    });
                }
            }, [routes, selectedRoute, activeFilter]);

            // --- Handlers ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginEmail === 'admin@thisistokyo.net' && loginPassword === '123456') {
                    setIsAdmin(true); setShowLoginModal(false); setLoginError('');
                } else { setLoginError('ID/PW 불일치'); }
            };

            const handleFetchYT = async () => {
                if (!googleApiKey) return alert("API Key Required");
                setIsFetchingInfo(true);
                try {
                    const vid = youtubeUrl.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${vid}&key=${googleApiKey}`);
                    const data = await res.json();
                    const snippet = data.items[0].snippet;
                    const desc = snippet.description;
                    const coord = desc.match(/Coordinates:\s*(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)/i);
                    const dist = desc.match(/Distance:\s*([\d.]+\s*(?:km|m)?)/i);
                    setNewRouteForm({ ...newRouteForm, title: snippet.title, description: desc, lat: coord?.[1] || "", lng: coord?.[3] || "", distance: dist?.[1] || "", videoId: vid, thumbnail: snippet.thumbnails?.high?.url });
                } catch (e) { alert("Fetch Fail"); } finally { setIsFetchingInfo(false); }
            };

            const handleAdd = async () => {
                if(!newRouteForm.lat) return alert("No Coordinates");
                await db.collection(ROUTES_PATH).add({ ...newRouteForm, date: new Date().toISOString() });
                setNewRouteForm({ title:'', location:'', description:'', lat:'', lng:'', videoId:'', thumbnail:'', themes:[], distance:'', difficulty:3 });
                setYoutubeUrl('');
            };

            const formatDate = (iso) => { if(!iso) return ""; const d = new Date(iso); return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`; };
            const isNew = (iso) => (new Date() - new Date(iso)) / 86400000 <= 3;
            const filteredRoutes = activeFilter === 'All' ? routes : routes.filter(r => r.themes.includes(activeFilter));

            return (
                <div className="min-h-screen text-slate-800">
                    {/* Header */}
                    <header className={`fixed top-0 left-0 right-0 z-[100] transition-all duration-500 ${scrolled ? 'bg-slate-900/95 backdrop-blur-md shadow-xl h-16' : 'bg-slate-900 h-24'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo({top:0, behavior:'smooth'})}>
                                <div className="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-700 rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg text-xl">東</div>
                                <div className="flex flex-col">
                                    <span className="font-black text-2xl text-white italic tracking-tighter uppercase leading-none">TOKYO <span className="text-orange-500">RUNNING.</span></span>
                                    <span className="text-[12px] font-black text-orange-500 tracking-widest mt-1 uppercase opacity-95">{t.heroSub}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex bg-white/5 p-1 rounded-full border border-white/10">
                                    <button onClick={() => setLang('ko')} className={`px-4 py-1.5 text-[10px] font-black rounded-full ${lang==='ko'?'bg-orange-600 text-white':'text-slate-400'}`}>KOR</button>
                                    <button onClick={() => setLang('ja')} className={`px-4 py-1.5 text-[10px] font-black rounded-full ${lang==='ja'?'bg-orange-600 text-white':'text-slate-400'}`}>JPN</button>
                                </div>
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-3 text-white bg-white/5 hover:bg-orange-600 border border-white/10 rounded-2xl transition-all outline-none shadow-inner">
                                    <Icon name={isMenuOpen ? "x" : "menu"} />
                                </button>
                            </div>
                            {isMenuOpen && (
                                <div className="absolute top-full right-6 w-60 bg-slate-900 border border-slate-800 shadow-2xl rounded-[2rem] py-6 mt-3 flex flex-col z-[200] animate-in fade-in slide-in-from-top-4">
                                    <div className="sm:hidden flex justify-center gap-2 mb-6 px-6">
                                        <button onClick={()=>setLang('ko')} className="flex-1 py-2 text-[10px] font-black rounded-xl border border-slate-700 text-slate-300">KOREAN</button>
                                        <button onClick={()=>setLang('ja')} className="flex-1 py-2 text-[10px] font-black rounded-xl border border-slate-700 text-slate-300">JAPANESE</button>
                                    </div>
                                    <a href="#map-section" onClick={()=>setIsMenuOpen(false)} className="px-8 py-4 text-white text-[11px] font-black uppercase flex justify-between">Explore Map <Icon name="map" size={16} /></a>
                                    <a href="#videos" onClick={()=>setIsMenuOpen(false)} className="px-8 py-4 text-white text-[11px] font-black uppercase flex justify-between">Video Archive <Icon name="play" size={16} /></a>
                                    <div className="h-px bg-slate-800 my-4 mx-8"></div>
                                    <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" className="px-8 py-4 text-red-500 text-[11px] font-black uppercase flex justify-between">Subscribe <Icon name="youtube" size={16} /></a>
                                    <button onClick={()=>{ if(isAdmin) setIsAdmin(false); else setShowLoginModal(true); setIsMenuOpen(false); }} className="px-8 py-4 text-slate-600 text-[10px] font-black uppercase text-left">{isAdmin ? t.adminOff : t.adminOn}</button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="pt-24">
                        {/* Immersive Full-Width Map */}
                        <section id="map-section" className="w-full h-[500px] md:h-[650px] bg-slate-900 relative border-b border-slate-200 overflow-hidden flex items-center justify-center">
                            {mapError ? (
                                <div className="text-center p-8"><Icon name="alert-triangle" className="text-red-500 mb-4" size={48} /><button onClick={() => {setMapError(''); setGoogleApiKey('');}} className="px-8 py-3 bg-red-600 text-white font-bold rounded-2xl shadow-lg">Retry</button></div>
                            ) : isMapLoaded ? (
                                <div ref={mapRef} className="w-full h-full" />
                            ) : (
                                <div className="text-center"><Icon name="map" className="text-slate-700 animate-pulse mb-4" size={64} /><p className="text-xs font-black uppercase text-slate-600 tracking-[0.4em]">{t.mapLoading}</p></div>
                            )}
                            <div className="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-slate-950/40 to-transparent pointer-events-none"></div>
                        </section>

                        {/* Announcement */}
                        <section className="max-w-7xl mx-auto px-6 mt-16 mb-16">
                            <div className="bg-white rounded-[2.5rem] p-6 flex items-center gap-6 shadow-xl border border-slate-100 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-2 h-full bg-orange-600"></div>
                                <div className="bg-orange-600 text-white p-4 rounded-3xl shadow-lg"><Icon name="megaphone" /></div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-1"><span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">{t.announcement}</span><span className="text-[11px] text-slate-400 font-bold">{formatDate(announcement.createdAt)}</span>{isNew(announcement.createdAt) && <span className="px-1.5 py-0.5 bg-red-600 text-white text-[9px] font-black rounded italic ml-2">NEW</span>}</div>
                                    {isEditingAnnouncement ? (
                                        <div className="flex gap-4"><input type="text" value={editNoticeText} onChange={(e)=>setEditNoticeText(e.target.value)} className="flex-1 p-4 bg-slate-50 border rounded-2xl" /><button onClick={async ()=>{await db.doc(SETTINGS_PATH).set({text_ko:editNoticeText, createdAt:new Date().toISOString()}); setIsEditingAnnouncement(false);}} className="px-8 bg-slate-900 text-white font-black rounded-2xl">SAVE</button></div>
                                    ) : <p className="text-xl text-slate-900 font-black leading-tight">{lang==='ko'?announcement.text_ko:announcement.text_ja}</p>}
                                </div>
                                {isAdmin && <button onClick={()=>{setEditNoticeText(announcement.text_ko); setIsEditingAnnouncement(true);}} className="p-3 text-slate-300 hover:text-slate-900"><Icon name="edit-2" size={20}/></button>}
                            </div>
                        </section>

                        {/* Admin Tools */}
                        {isAdmin && (
                            <section className="max-w-7xl mx-auto px-6 pb-24 animate-in fade-in slide-in-from-top-4">
                                <div className="bg-slate-900 rounded-[3.5rem] p-10 shadow-2xl border border-slate-800">
                                    <h2 className="text-4xl font-black text-white italic tracking-tighter mb-10 uppercase border-l-8 border-orange-600 pl-6">Register Route</h2>
                                    <div className="flex flex-col sm:flex-row gap-4 mb-12">
                                        <input type="text" placeholder="YOUTUBE URL" value={youtubeUrl} onChange={(e)=>setYoutubeUrl(e.target.value)} className="flex-1 p-6 bg-slate-800 border border-slate-700 rounded-3xl text-white font-bold outline-none" />
                                        <button onClick={handleFetchYT} className="px-12 py-6 bg-orange-600 text-white font-black rounded-3xl uppercase italic shadow-xl">Fetch</button>
                                    </div>
                                    {newRouteForm.title && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                            <div className="space-y-4">
                                                <input type="text" value={newRouteForm.title} onChange={(e)=>setNewRouteForm({...newRouteForm, title:e.target.value})} className="w-full p-4 bg-slate-800 border rounded-2xl text-white" />
                                                <input type="text" value={newRouteForm.distance} onChange={(e)=>setNewRouteForm({...newRouteForm, distance:e.target.value})} placeholder="Distance" className="w-full p-4 bg-slate-800 border rounded-2xl text-white" />
                                                <div className="flex gap-4">
                                                    <input type="text" placeholder="Lat" value={newRouteForm.lat} onChange={(e)=>setNewRouteForm({...newRouteForm, lat:e.target.value})} className="p-4 bg-emerald-950/20 rounded-2xl text-emerald-400 text-center flex-1" />
                                                    <input type="text" placeholder="Lng" value={newRouteForm.lng} onChange={(e)=>setNewRouteForm({...newRouteForm, lng:e.target.value})} className="p-4 bg-emerald-950/20 rounded-2xl text-emerald-400 text-center flex-1" />
                                                </div>
                                            </div>
                                            <button onClick={handleAdd} className="md:col-span-2 py-8 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-black rounded-[3rem] text-2xl uppercase italic tracking-tighter">Deploy to Map</button>
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}

                        {/* Gallery Section */}
                        <section id="videos" className="max-w-7xl mx-auto px-6 pb-32">
                            <div className="flex flex-col lg:flex-row lg:items-end justify-between mb-16 gap-10 border-b-8 border-slate-900 pb-12">
                                <div><h2 className="text-6xl font-black text-slate-900 tracking-tighter italic uppercase leading-none">{t.allCourses}</h2><p className="text-2xl font-bold text-slate-400 mt-4 tracking-tight">{t.courseSub}</p></div>
                                <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                                    {Object.keys(t.themes).map(k => (
                                        <button key={k} onClick={() => setActiveFilter(k)} className={`px-7 py-3 rounded-full text-[11px] font-black transition-all border-2 whitespace-nowrap uppercase ${activeFilter===k?'bg-slate-900 border-slate-900 text-white shadow-2xl scale-105':'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}>{t.themes[k]}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-16">
                                {filteredRoutes.map((route) => (
                                    <div key={route.id} onClick={() => setSelectedRoute(route)} className="group cursor-pointer">
                                        <div className="relative aspect-[3/4] rounded-[2.5rem] overflow-hidden mb-6 bg-slate-200 shadow-2xl transition-all duration-700 group-hover:-translate-y-4 border border-slate-100">
                                            <img src={route.thumbnail} className="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale group-hover:grayscale-0" />
                                            <div className="absolute top-6 left-6 flex flex-col gap-2">
                                                {route.themes.map(th => <span key={th} className="px-3 py-1 bg-white/95 backdrop-blur text-slate-950 text-[9px] font-black rounded-xl uppercase shadow-xl tracking-widest text-[10px]">#{translations[lang].themes[th]}</span>)}
                                            </div>
                                            <div className="absolute inset-0 bg-orange-600/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-500">
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-all duration-500 shadow-2xl"><Icon name="play" className="text-slate-950 ml-1" /></div>
                                            </div>
                                        </div>
                                        <div className="px-2 space-y-3">
                                            <div className="flex items-center justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]"><span>{formatDate(route.date)}</span><span className="text-orange-600 bg-orange-50 px-2 py-0.5 rounded-lg">{route.distance}</span></div>
                                            <h3 className="text-2xl font-black text-slate-950 group-hover:text-orange-600 transition-colors leading-tight tracking-tighter uppercase">{lang === 'ko' ? route.title_ko : route.title_ja}</h3>
                                            <div className="flex justify-between items-center"><p className="text-xs text-slate-500 font-bold uppercase tracking-widest flex items-center gap-2"><Icon name="map-pin" size={14} className="text-orange-600" /> {lang === 'ko' ? route.location_ko : route.location_ja}</p><StarRating rating={route.difficulty} size={10} /></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-white py-24 px-10 border-t-[12px] border-orange-600 text-center">
                        <div className="max-w-7xl mx-auto flex flex-col items-center gap-12">
                            <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" className="w-20 h-20 bg-white/5 rounded-[2rem] flex items-center justify-center hover:bg-red-600 transition-all shadow-2xl border border-white/10 group"><Icon name="youtube" size={32} /></a>
                            <div className="text-center space-y-4">
                                <h2 className="text-5xl font-black tracking-tighter italic uppercase leading-none">TOKYO <span className="text-orange-600">RUNNING.</span></h2>
                                <p className="text-slate-500 font-black text-sm uppercase tracking-[0.4em] opacity-60">도쿄를 달리고 기록합니다</p>
                            </div>
                            <div className="w-24 h-px bg-slate-800"></div>
                            <p className="text-[11px] text-slate-700 font-black tracking-[0.4em] uppercase opacity-50 leading-loose">©도쿄를 달리는 남자 ALL RIGHTS RESERVED.</p>
                        </div>
                    </footer>

                    {/* Premium Detail Modal */}
                    {selectedRoute && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-2 sm:p-10 bg-slate-950/95 backdrop-blur-3xl animate-in fade-in duration-500">
                            <div className="absolute inset-0" onClick={()=>setSelectedRoute(null)}></div>
                            <div className="relative w-full max-w-7xl bg-white rounded-[3rem] sm:rounded-[4rem] overflow-hidden shadow-2xl flex flex-col lg:flex-row max-h-[96vh] sm:max-h-[92vh] border border-white/20 animate-modal">
                                <button onClick={()=>setSelectedRoute(null)} className="absolute top-6 right-6 sm:top-10 sm:right-10 z-50 w-12 h-12 sm:w-16 sm:h-16 bg-white text-slate-950 rounded-full flex items-center justify-center transition-all shadow-2xl border border-slate-100 group outline-none">
                                    <Icon name="x" size={32} className="group-hover:rotate-90 transition-transform duration-300" />
                                </button>
                                <div className="w-full lg:w-3/5 bg-slate-950 relative overflow-hidden group">
                                    <img src={selectedRoute.thumbnail} className="w-full h-full object-cover opacity-60 transition-transform duration-[6s] group-hover:scale-110" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-white text-center pointer-events-none">
                                        <div className="w-24 h-24 sm:w-32 sm:h-32 bg-red-600 rounded-full flex items-center justify-center shadow-2xl mb-10"><Icon name="play" size={48} className="ml-2" /></div>
                                        <h4 className="text-xl font-black tracking-[0.5em] uppercase opacity-60 italic">Digital Archive Stream</h4>
                                    </div>
                                    <div className="absolute bottom-8 left-8 sm:bottom-12 sm:left-12 flex gap-10">
                                        <div className="flex items-center gap-3">
                                            <div className="w-12 h-12 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center border border-white/20"><Icon name="navigation" className="text-orange-500" /></div>
                                            <div><p className="text-[10px] font-black text-white/50 uppercase tracking-widest leading-none mb-1">{t.courseStats.dist}</p><p className="text-xl font-black text-white leading-none">{selectedRoute.distance}</p></div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="w-12 h-12 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center border border-white/20"><Icon name="gauge" className="text-orange-500" /></div>
                                            <div><p className="text-[10px] font-black text-white/50 uppercase tracking-widest leading-none mb-1">{t.courseStats.diff}</p><StarRating rating={selectedRoute.difficulty} size={14} /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-2/5 p-12 lg:p-20 overflow-y-auto bg-white flex flex-col border-l border-slate-100">
                                    <div className="mb-6 sm:mb-10 flex flex-wrap gap-2">{selectedRoute.themes.map(th => <span key={th} className="px-4 py-1.5 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-[0.2em] shadow-lg">#{translations[lang].themes[th]}</span>)}</div>
                                    <h2 className="text-3xl sm:text-4xl lg:text-5xl font-black text-slate-950 mb-6 leading-[0.85] tracking-tighter uppercase">{lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}</h2>
                                    <div className="flex items-center gap-3 text-slate-400 font-black text-sm mb-14 uppercase tracking-[0.3em]"><Icon name="map-pin" size={20} className="text-orange-600" /> {lang === 'ko' ? selectedRoute.location_ko : selectedRoute.location_ja}</div>
                                    <div className="relative p-12 bg-slate-50 rounded-[3.5rem] mb-16 border border-slate-100 shadow-inner text-orange-500"><div className="absolute -top-5 -left-5 w-14 h-14 bg-slate-950 text-white rounded-2xl flex items-center justify-center text-4xl font-black italic shadow-2xl">“</div><p className="text-2xl font-bold text-slate-700 italic leading-tight">"{lang === 'ko' ? selectedRoute.description_ko : selectedRoute.description_ja}"</p></div>
                                    <div className="mt-auto space-y-8">
                                        <a href={`https://www.youtube.com/watch?v=${selectedRoute.videoId}`} target="_blank" className="w-full flex items-center justify-center gap-5 py-8 bg-red-600 text-white rounded-[2.5rem] font-black text-2xl uppercase active:scale-95 shadow-2xl italic tracking-tighter">WATCH FULL REPORT</a>
                                        <div className="pt-12 border-t-2 border-slate-100 text-left">
                                            <div className="flex items-center justify-between mb-8"><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">{t.shareTitle}</h3>{shareMessage && <span className="text-xs text-orange-600 font-black animate-pulse uppercase tracking-widest">{shareMessage}</span>}</div>
                                            <div className="flex gap-4">
                                                <button onClick={handleCopyLink} className="flex-1 flex items-center justify-center gap-4 py-6 bg-slate-100 text-slate-950 rounded-[2.5rem] text-[11px] font-black uppercase tracking-[0.2em] transition-all hover:bg-slate-200"><Icon name="link" size={20} className="text-orange-500" /> {t.copyLink}</button>
                                                <a href={`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(`[TOKYO RUNNING] ${lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}`)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-[#1DA1F2] text-white rounded-[2.5rem] hover:bg-[#1a8cd8] shadow-2xl active:rotate-12 transition-all"><Icon name="twitter" size={28} fill="currentColor" /></a>
                                                <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-[#1877F2] text-white rounded-[2.5rem] hover:opacity-90 shadow-2xl transition-all"><Icon name="facebook" size={28} fill="currentColor" /></a>
                                                <a href={`https://www.threads.net/intent/post?text=${encodeURIComponent(`[TOKYO RUNNING] ${lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}\n${window.location.href}`)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-black text-white rounded-[2.5rem] hover:opacity-80 shadow-2xl border border-white/10 group transition-all">
                                                    <svg viewBox="0 0 24 24" className="w-8 h-8 fill-current group-hover:scale-110 transition-transform"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.328 12.852c-.66.66-1.572 1.026-2.584 1.026-1.572 0-2.85-1.12-2.85-2.5 0-1.38 1.278-2.5 2.85-2.5.588 0 1.134.156 1.584.426.33.204.6.492.798.834.198.342.312.738.312 1.152 0 .09-.006.18-.018.27-.012.09-.03.18-.054.27-.15.54-.486 1.008-.948 1.326-.462.318-1.026.492-1.632.492-1.2 0-2.202-.756-2.616-1.8-.06-.15-.102-.312-.132-.48a3.34 3.34 0 01-.042-.51c0-1.842 1.494-3.33 3.336-3.33 1.038 0 1.968.474 2.58 1.218.156.192.282.408.378.636.096.228.15.474.15.726 0 1.122-.906 2.028-2.022 2.028a2.02 2.02 0 01-1.428-.594c-.114-.114-.216-.246-.3-.39-.084-.144-.144-.3-.18-.462-.036-.162-.054-.33-.054-.504 0-.744.606-1.35 1.35-1.35.342 0 .654.126.894.336.24.21.414.498.486.828l.006.012c.006.03.012.06.012.09 0 .156-.126.282-.282.282s-.282-.126-.282-.282l-.006-.036c-.036-.168-.138-.306-.27-.402-.132-.096-.3-.156-.48-.156-.414 0-.75.336-.75.75 0 .09.012.18.03.27.018.09.048.18.09.264.198.42.63.714 1.128.714.756 0 1.368-.612 1.368-1.368 0-.132-.018-.258-.054-.384-.036-.126-.096-.246-.174-.348-.372-.498-.954-.822-1.614-.822-1.128 0-2.046.918-2.046 2.046 0 .066.006.132.012.198.006.066.018.132.036.198.246.852 1.026 1.482 1.962 1.482.438 0 .84-.126 1.176-.348.336-.222.582-.546.696-.924.012-.042.024-.084.03-.126.006-.042.006-.084.006-.126 0-.216-.066-.42-.186-.588-.12-.168-.288-.288-.48-.348-.288-.09-.594-.138-.912-.138-2.046 0-3.708 1.662-3.708 3.708 0 .156.012.312.03.468.018.156.048.312.09.462.63 2.166 2.634 3.75 5.01 3.75 1.74 0 3.288-.84 4.26-2.124.234-.306.42-.642.552-.996.132-.354.198-.732.198-1.122 0-2.31-1.122-4.362-2.856-5.634l-.018-.012z"/></svg>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Login Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md animate-in fade-in duration-300">
                            <div className="absolute inset-0" onClick={()=>setShowLoginModal(false)}></div>
                            <form onSubmit={handleLogin} className="relative w-full max-w-md bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100 flex flex-col items-center animate-in zoom-in-95 duration-300">
                                <div className="w-20 h-20 bg-orange-100 text-orange-600 rounded-3xl flex items-center justify-center mb-6"><Icon name="lock" size={32} /></div>
                                <h2 className="text-3xl font-black text-slate-900 uppercase italic mb-2 leading-none">Admin Login</h2>
                                <p className="text-sm text-slate-500 font-bold mb-8 italic">관리자 대시보드 권한 인증</p>
                                <div className="w-full space-y-4 mb-8">
                                    <input type="email" required value={loginEmail} onChange={(e)=>setLoginEmail(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-orange-500 transition-all shadow-inner text-slate-950" placeholder="Email" />
                                    <input type="password" required value={loginPassword} onChange={(e)=>setLoginPassword(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-orange-500 transition-all shadow-inner text-slate-950" placeholder="Password" />
                                    {loginError && <p className="text-xs text-red-500 font-black uppercase tracking-widest">{loginError}</p>}
                                </div>
                                <button type="submit" className="w-full py-5 bg-slate-900 text-white font-black rounded-3xl text-lg uppercase italic tracking-tighter shadow-2xl active:scale-95 transition-all">Authorize Access</button>
                                <button type="button" onClick={()=>setShowLoginModal(false)} className="mt-4 text-xs font-black text-slate-400 uppercase tracking-widest hover:text-slate-600">Cancel</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
