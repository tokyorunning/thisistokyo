<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO RUNNING. - 도쿄를 달리고 기록합니다</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 아이콘 컴포넌트 래퍼 (Lucide)
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- 데이터 및 언어 설정 (이전과 동일) ---
        const translations = {
            ko: {
                siteTitle: "도쿄를 달리는 남자",
                heroTitle: "TOKYO RUNNING.",
                heroSub: "도쿄를 달리고 기록합니다",
                mapLoading: "관리자 모드에서 API 키를 입력하면 실제 구글 지도가 렌더링됩니다.",
                announcement: "NOTICE",
                allCourses: "RUNNING ROUTES",
                courseSub: "테마별로 큐레이션된 도쿄의 러닝 코스",
                shareTitle: "SHARE THIS ROUTE",
                copyLink: "URL Copy",
                viewOnYoutube: "WATCH ON YOUTUBE",
                copied: "✅ URL이 클립보드에 복사되었습니다!",
                adminOn: "🛠️ 관리자 모드 켜기",
                adminOff: "🛠️ 관리자 로그아웃",
                courseStats: { dist: "거리", diff: "난이도" },
                themes: { All: "전체", City: "시티", Nature: "자연", Park: "공원", Night: "야간", Training: "장거리", Morning: "아침", Race: "대회", Overseas: "해외" }
            },
            ja: {
                siteTitle: "東走男",
                heroTitle: "TOKYO RUNNING.",
                heroSub: "東京を走り、記録する",
                mapLoading: "管理者モードでAPIキーを入力すると、実際のGoogleマップが表示されます。",
                announcement: "お知らせ",
                allCourses: "RUNNING ROUTES",
                courseSub: "テーマ別に厳選された東京のランニングコース",
                shareTitle: "SHARE THIS ROUTE",
                copyLink: "URL Copy",
                viewOnYoutube: "YouTubeで視聴する",
                copied: "✅ URLをコピーしました!",
                adminOn: "🛠️ 管理者モード",
                adminOff: "🛠️ ログアウト",
                courseStats: { dist: "距離", diff: "難易度" },
                themes: { All: "すべて", City: "シティ", Nature: "自然", Park: "公園", Night: "ナイト", Training: "ロング", Morning: "朝", Race: "大会", Overseas: "海外" }
            }
        };

        const initialRoutes = [
            { id: 1, title_ko: "아라카와 강변 20km 롱런", title_ja: "荒川河川敷 20km ロングラン", location_ko: "도쿄도 기타구 (北구)", location_ja: "東京都北区", description_ko: "신호등이 없어 논스톱으로 달리기 좋은 최고의 평지 코스입니다.", description_ja: "信号がなくノンストップで走れる最高の平坦コースです。", difficulty: 2, distance: "20km", videoId: "dQw4w9WgXcQ", thumbnail: "https://images.unsplash.com/photo-1528629297340-d1d466945dc5?auto=format&fit=crop&q=80&w=600&h=400", themes: ["Nature", "Training"], date: "2024.03.15", lat: 35.7595, lng: 139.8239 },
            { id: 2, title_ko: "황거(고쿄) 야간 러닝", title_ja: "皇居ナイトランニング", location_ko: "도쿄도 치요다구 (千代田구)", location_ja: "東京都千代田区", description_ko: "도쿄 러너들의 성지! 안전하고 조명이 밝아 퇴근 후 야간 러닝으로 추천합니다.", description_ja: "東京ランナーの聖地！安全で照明が明るいため、仕事帰りに最適です。", difficulty: 3, distance: "5km", videoId: "dQw4w9WgXcQ", thumbnail: "https://images.unsplash.com/photo-1494522855154-9297ac14b55f?auto=format&fit=crop&q=80&w=600&h=400", themes: ["City", "Night"], date: "2024.02.28", lat: 35.6852, lng: 139.7528 }
        ];

        // 메인 App 컴포넌트
        function App() {
            const [lang, setLang] = useState('ko');
            const [runningRoutes, setRunningRoutes] = useState(initialRoutes);
            const [selectedRoute, setSelectedRoute] = useState(null);
            const [activeFilter, setActiveFilter] = useState('All');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [shareMessage, setShareMessage] = useState('');
            const [scrolled, setScrolled] = useState(false);
            const [googleApiKey, setGoogleApiKey] = useState('');
            const [isMapLoaded, setIsMapLoaded] = useState(false);
            const [mapError, setMapError] = useState('');
            const [isAdmin, setIsAdmin] = useState(true);
            const [announcement, setAnnouncement] = useState({ text_ko: "이번 주말은 아라카와 강변에서 20km 롱런 훈련 예정입니다! 🏃‍♂️💨", text_ja: "今週末は荒川河川敷で20kmロングランの予定です！🏃‍♂️💨", createdAt: new Date().toISOString() });
            const [isEditingAnnouncement, setIsEditingAnnouncement] = useState(false);
            const [editAnnouncementText, setEditAnnouncementText] = useState("");
            const [youtubeUrl, setYoutubeUrl] = useState('');
            const [isFetchingInfo, setIsFetchingInfo] = useState(false);
            const [newRouteForm, setNewRouteForm] = useState({ title: '', location: '', description: '', lat: '', lng: '', videoId: '', thumbnail: '', themes: [], distance: '', difficulty: 3 });

            const mapRef = useRef(null);
            const googleMapInstance = useRef(null);
            const markersRef = useRef([]);
            const t = translations[lang];

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (googleApiKey && !isMapLoaded) {
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}`;
                    script.async = true;
                    script.onload = () => setIsMapLoaded(true);
                    script.onerror = () => setMapError("Google Maps 로드 실패.");
                    document.head.appendChild(script);
                }
            }, [googleApiKey]);

            useEffect(() => {
                if (isMapLoaded && mapRef.current && !googleMapInstance.current) {
                    googleMapInstance.current = new window.google.maps.Map(mapRef.current, {
                        center: { lat: 35.6895, lng: 139.6917 },
                        zoom: 11,
                        styles: [
                            { featureType: "all", elementType: "labels.text.fill", stylers: [{ color: "#ffffff" }] },
                            { featureType: "landscape", elementType: "all", stylers: [{ color: "#242f3e" }] },
                            { featureType: "water", elementType: "all", stylers: [{ color: "#17263c" }] }
                        ],
                        mapTypeControl: false, streetViewControl: false,
                    });
                }
            }, [isMapLoaded]);

            useEffect(() => {
                if (googleMapInstance.current) {
                    markersRef.current.forEach(m => m.setMap(null));
                    markersRef.current = [];
                    runningRoutes.forEach(route => {
                        const marker = new window.google.maps.Marker({
                            position: { lat: route.lat, lng: route.lng },
                            map: googleMapInstance.current,
                            icon: { path: 0, scale: 10, fillColor: selectedRoute?.id === route.id ? "#fb923c" : "#3b82f6", fillOpacity: 1, strokeWeight: 3, strokeColor: "#ffffff" }
                        });
                        marker.addListener('click', () => setSelectedRoute(route));
                        markersRef.current.push(marker);
                    });
                }
            }, [runningRoutes, selectedRoute]);

            const handleCopyLink = () => {
                const url = window.location.href;
                navigator.clipboard.writeText(url).then(() => {
                    setShareMessage(t.copied);
                    setTimeout(() => setShareMessage(''), 3000);
                });
            };

            const handleFetchYouTubeData = async () => {
                if (!googleApiKey) return alert("API 키를 입력하세요.");
                setIsFetchingInfo(true);
                try {
                    const videoId = youtubeUrl.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${googleApiKey}`);
                    const data = await res.json();
                    const snippet = data.items[0].snippet;
                    const coordMatch = snippet.description.match(/Coordinates:\s*(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)/i);
                    const distMatch = snippet.description.match(/Distance:\s*([\d.]+\s*(?:km|m)?)/i);
                    setNewRouteForm({ ...newRouteForm, title: snippet.title, description: snippet.description, lat: coordMatch?.[1] || "", lng: coordMatch?.[3] || "", distance: distMatch?.[1] || "", videoId, thumbnail: snippet.thumbnails?.high?.url || "" });
                } catch (e) { alert("추출 실패"); } finally { setIsFetchingInfo(false); }
            };

            const filteredRoutes = activeFilter === 'All' ? runningRoutes : runningRoutes.filter(r => r.themes.includes(activeFilter));

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800">
                    {/* Header */}
                    <header className={`fixed top-0 left-0 right-0 z-[100] transition-all duration-500 ${scrolled ? 'bg-slate-900/95 backdrop-blur-md h-16' : 'bg-slate-900 h-24'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between relative">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo({top:0, behavior:'smooth'})}>
                                <div className="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-700 rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg text-xl">東</div>
                                <div className="flex flex-col">
                                    <span className="font-black text-2xl text-white italic">TOKYO <span className="text-orange-500">RUNNING.</span></span>
                                    <span className="text-[12px] font-black text-orange-500 tracking-widest uppercase">{t.heroSub}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex bg-white/5 p-1 rounded-full border border-white/10">
                                    <button onClick={() => setLang('ko')} className={`px-4 py-1.5 text-[10px] font-black rounded-full transition-all ${lang === 'ko' ? 'bg-orange-600 text-white' : 'text-slate-400'}`}>KOR</button>
                                    <button onClick={() => setLang('ja')} className={`px-4 py-1.5 text-[10px] font-black rounded-full transition-all ${lang === 'ja' ? 'bg-orange-600 text-white' : 'text-slate-400'}`}>JPN</button>
                                </div>
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-3 text-white bg-white/5 hover:bg-orange-600 rounded-2xl transition-all border border-white/10">
                                    {isMenuOpen ? <Icon name="x" /> : <Icon name="menu" />}
                                </button>
                            </div>
                            {isMenuOpen && (
                                <div className="absolute top-full right-6 w-64 bg-slate-900 border border-slate-800 shadow-2xl rounded-[2.5rem] py-6 mt-3 flex flex-col z-50">
                                    <a href="#map-section" onClick={()=>setIsMenuOpen(false)} className="px-8 py-4 text-white text-[11px] font-black uppercase">Explore Map</a>
                                    <a href="#videos" onClick={()=>setIsMenuOpen(false)} className="px-8 py-4 text-white text-[11px] font-black uppercase">Video Archive</a>
                                    <div className="h-px bg-slate-800 my-4 mx-8"></div>
                                    <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" className="px-8 py-4 text-red-500 text-[11px] font-black uppercase">Subscribe YouTube</a>
                                    <button onClick={()=>{setIsAdmin(!isAdmin); setIsMenuOpen(false);}} className="px-8 py-4 text-slate-500 text-[10px] font-black uppercase tracking-widest text-left">{isAdmin ? "Admin Logout" : "Admin Mode"}</button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="pt-24">
                        {/* Map Section */}
                        <section id="map-section" className="w-full h-[500px] md:h-[650px] bg-slate-900 border-b border-slate-200 relative">
                            {mapError ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                                    <Icon name="alert-triangle" className="text-red-500 mb-4" size={48} />
                                    <button onClick={() => setGoogleApiKey('')} className="px-8 py-3 bg-red-600 text-white font-bold rounded-2xl">Retry Key</button>
                                </div>
                            ) : isMapLoaded ? (
                                <div ref={mapRef} className="w-full h-full" />
                            ) : (
                                <div className="w-full h-full flex flex-col items-center justify-center space-y-4">
                                    <Icon name="map" className="text-slate-700 animate-pulse" size={64} />
                                    <p className="text-xs font-black uppercase text-slate-600 tracking-widest">{t.mapLoading}</p>
                                </div>
                            )}
                        </section>

                        {/* Announcement */}
                        <section className="max-w-7xl mx-auto px-6 mt-16 mb-16">
                            <div className="bg-white rounded-[2.5rem] p-6 flex items-center gap-6 shadow-xl border border-slate-100 relative overflow-hidden">
                                <div className="bg-orange-600 text-white p-4 rounded-3xl shadow-lg flex-shrink-0"><Icon name="megaphone" /></div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">{t.announcement}</span>
                                        <span className="text-[11px] text-slate-400 font-bold">{formatDateTime(announcement.createdAt)}</span>
                                    </div>
                                    <p className="text-xl text-slate-900 font-black leading-tight tracking-tight">{lang === 'ko' ? announcement.text_ko : announcement.text_ja}</p>
                                </div>
                                {isAdmin && <button onClick={()=>alert("공지사항 편집 모드는 로컬 미리보기에서만 작동합니다.")} className="p-3 text-slate-300 hover:text-slate-900"><Icon name="edit-2" size={20}/></button>}
                            </div>
                        </section>

                        {/* Admin Workshop */}
                        {isAdmin && (
                            <section className="max-w-7xl mx-auto px-6 pb-24">
                                {!isMapLoaded && (
                                    <div className="bg-orange-600 text-white rounded-[3rem] p-10 mb-10 flex flex-col md:flex-row items-center justify-between shadow-2xl">
                                        <div className="text-center md:text-left"><h2 className="text-3xl font-black italic tracking-tighter mb-2 uppercase leading-none">Map Activation Required</h2><p className="text-sm font-bold opacity-80 italic">지도를 활성화하기 위해 API 키를 입력하세요.</p></div>
                                        <input type="text" placeholder="ENTER API KEY" value={googleApiKey} onChange={(e) => setGoogleApiKey(e.target.value)} className="w-full md:w-1/3 p-5 bg-white/20 border border-white/40 rounded-[2rem] text-white font-black placeholder-white/50 outline-none" />
                                    </div>
                                )}
                                <div className="bg-slate-900 rounded-[3.5rem] p-10 sm:p-14 shadow-2xl border border-slate-800">
                                    <h2 className="text-4xl font-black text-white italic tracking-tighter mb-10 flex items-center gap-4 uppercase border-l-8 border-orange-600 pl-6 leading-none">Register New Route</h2>
                                    <div className="flex flex-col sm:flex-row gap-4 mb-12">
                                        <input type="text" placeholder="PASTE YOUTUBE URL" value={youtubeUrl} onChange={(e)=>setYoutubeUrl(e.target.value)} className="flex-1 p-6 bg-slate-800 border border-slate-700 rounded-3xl text-white font-bold outline-none" />
                                        <button onClick={handleFetchYouTubeData} className="px-12 py-6 bg-orange-600 text-white font-black rounded-3xl uppercase italic shadow-xl">Fetch Data</button>
                                    </div>
                                    {newRouteForm.title && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 animate-in zoom-in-95">
                                            <div className="space-y-4">
                                                <label className="text-xs text-orange-500 font-black uppercase">01. Themes & Diff</label>
                                                <div className="flex flex-wrap gap-2">
                                                    {availableThemes.map(th => <button key={th} onClick={()=>{
                                                        let arr = [...newRouteForm.themes];
                                                        if(arr.includes(th)) arr = arr.filter(x=>x!==th);
                                                        else if(arr.length < 3) arr.push(th);
                                                        setNewRouteForm({...newRouteForm, themes: arr});
                                                    }} className={`px-4 py-2 rounded-xl text-[10px] font-black border-2 ${newRouteForm.themes.includes(th) ? 'bg-white text-slate-950' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>{translations.ko.themes[th]}</button>)}
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <label className="text-xs text-slate-500 font-black uppercase">02. Info</label>
                                                <input type="text" value={newRouteForm.title} onChange={(e)=>setNewRouteForm({...newRouteForm, title: e.target.value})} className="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white font-bold" />
                                                <input type="text" value={newRouteForm.distance} onChange={(e)=>setNewRouteForm({...newRouteForm, distance: e.target.value})} placeholder="Distance (ex: 10km)" className="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white font-bold" />
                                            </div>
                                            <button onClick={handleAddNewRoute} className="md:col-span-2 py-8 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-black rounded-[3rem] text-2xl uppercase shadow-2xl italic tracking-tighter">Deploy to Public Map</button>
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}

                        {/* Gallery */}
                        <section id="videos" className="max-w-7xl mx-auto px-6 pb-32">
                            <div className="flex flex-col lg:flex-row lg:items-end justify-between mb-16 gap-10 border-b-8 border-slate-900 pb-12">
                                <div><h2 className="text-6xl font-black text-slate-900 tracking-tighter italic uppercase leading-none">{t.allCourses}</h2><p className="text-2xl font-bold text-slate-400 mt-4 tracking-tight">{t.courseSub}</p></div>
                                <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                                    {Object.keys(t.themes).map(key => (
                                        <button key={key} onClick={() => setActiveFilter(key)} className={`px-7 py-3 rounded-full text-[11px] font-black transition-all border-2 whitespace-nowrap uppercase ${activeFilter === key ? 'bg-slate-900 text-white shadow-2xl scale-105' : 'bg-white text-slate-400'}`}>{t.themes[key]}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-16">
                                {filteredRoutes.map((route) => (
                                    <div key={route.id} onClick={() => setSelectedRoute(route)} className="group cursor-pointer">
                                        <div className="relative aspect-[3/4] rounded-[2.5rem] overflow-hidden mb-6 bg-slate-200 shadow-2xl transition-all duration-700 group-hover:-translate-y-4 border border-slate-100">
                                            <img src={route.thumbnail} className="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale group-hover:grayscale-0" />
                                            <div className="absolute top-6 left-6 flex flex-col gap-2">
                                                {route.themes.map(th => <span key={th} className="px-3 py-1 bg-white/95 backdrop-blur text-slate-950 text-[9px] font-black rounded-xl uppercase shadow-xl tracking-widest">{translations[lang].themes[th]}</span>)}
                                            </div>
                                            <div className="absolute inset-0 bg-orange-600/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-all duration-500 shadow-2xl"><Icon name="play" className="text-slate-950" /></div>
                                            </div>
                                        </div>
                                        <div className="px-2 space-y-3">
                                            <div className="flex items-center justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]"><span>{route.date}</span><span className="text-orange-600 bg-orange-50 px-2 py-0.5 rounded-lg">{route.distance}</span></div>
                                            <h3 className="text-2xl font-black text-slate-950 group-hover:text-orange-600 leading-tight tracking-tighter uppercase italic">{lang === 'ko' ? route.title_ko : route.title_ja}</h3>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-white py-24 px-10 border-t-[12px] border-orange-600 relative">
                        <div className="max-w-7xl mx-auto flex flex-col items-center gap-12">
                            <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" className="w-20 h-20 bg-white/5 rounded-[2rem] flex items-center justify-center hover:bg-red-600 transition-all shadow-2xl border border-white/10 group"><Icon name="youtube" size={32} /></a>
                            <div className="text-center">
                                <h2 className="text-5xl font-black tracking-tighter italic uppercase mb-4">TOKYO <span className="text-orange-600">RUNNING.</span></h2>
                                <p className="text-slate-500 font-black text-sm uppercase opacity-60">도쿄를 달리고 기록합니다</p>
                            </div>
                            <div className="w-24 h-px bg-slate-800"></div>
                            <p className="text-[11px] text-slate-700 font-black tracking-[0.4em] uppercase opacity-50">©도쿄를 달리는 남자 ALL RIGHTS RESERVED.</p>
                        </div>
                    </footer>

                    {/* Detail Modal (Simplified for Deployment Index) */}
                    {selectedRoute && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-3xl animate-in fade-in duration-500">
                            <div className="absolute inset-0" onClick={()=>setSelectedRoute(null)}></div>
                            <div className="relative w-full max-w-7xl bg-white rounded-[4rem] overflow-hidden shadow-2xl flex flex-col lg:flex-row max-h-[92vh] border border-white/20">
                                <button onClick={()=>setSelectedRoute(null)} className="absolute top-8 right-8 z-50 w-16 h-16 bg-white text-slate-950 rounded-full flex items-center justify-center transition-all shadow-2xl border border-slate-100"><Icon name="x" size={32} /></button>
                                <div className="w-full lg:w-3/5 bg-slate-950 relative overflow-hidden">
                                    <img src={selectedRoute.thumbnail} className="w-full h-full object-cover opacity-60" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-white p-12 text-center pointer-events-none">
                                        <div className="w-32 h-32 bg-red-600 rounded-full flex items-center justify-center shadow-2xl mb-10"><Icon name="play" size={48} /></div>
                                        <h4 className="text-xl font-black tracking-[0.5em] uppercase opacity-60 italic">Digital Archive Stream</h4>
                                    </div>
                                </div>
                                <div className="w-full lg:w-2/5 p-12 lg:p-20 overflow-y-auto bg-white flex flex-col">
                                    <div className="mb-10 flex flex-wrap gap-3">{selectedRoute.themes.map(th => <span key={th} className="px-5 py-2 bg-slate-950 text-white text-[10px] font-black rounded-xl uppercase tracking-[0.3em]">#{translations[lang].themes[th]}</span>)}</div>
                                    <h2 className="text-5xl font-black text-slate-950 mb-6 leading-[0.85] tracking-tighter uppercase italic">{lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}</h2>
                                    <div className="flex items-center gap-3 text-slate-400 font-black text-sm mb-14 uppercase tracking-[0.3em]"><Icon name="map-pin" size={20} className="text-orange-600" /> {lang === 'ko' ? selectedRoute.location_ko : selectedRoute.location_ja}</div>
                                    <div className="relative p-12 bg-slate-50 rounded-[3.5rem] mb-16 border border-slate-100 shadow-inner"><p className="text-2xl font-bold text-slate-700 italic leading-tight">"{lang === 'ko' ? selectedRoute.description_ko : selectedRoute.description_ja}"</p></div>
                                    <div className="mt-auto space-y-8">
                                        <a href={`https://www.youtube.com/watch?v=${selectedRoute.videoId}`} target="_blank" className="w-full flex items-center justify-center gap-5 py-8 bg-red-600 text-white rounded-[2.5rem] font-black text-2xl uppercase active:scale-95 shadow-2xl italic tracking-tighter">WATCH FULL REPORT</a>
                                        <div className="pt-12 border-t-2 border-slate-100">
                                            <div className="flex items-center justify-between mb-8"><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">{t.shareTitle}</h3>{shareMessage && <span className="text-xs text-orange-600 font-black animate-pulse">{shareMessage}</span>}</div>
                                            <div className="flex gap-4">
                                                <button onClick={handleCopyLink} className="flex-1 flex items-center justify-center gap-4 py-6 bg-slate-100 text-slate-950 rounded-[2.5rem] text-[11px] font-black uppercase tracking-[0.2em] transition-all"><Icon name="link" size={20} /> {t.copyLink}</button>
                                                <a href={`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(`[TOKYO RUNNING] ${lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}`)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-[#1DA1F2] text-white rounded-[2.5rem] shadow-2xl"><Icon name="twitter" size={28} /></a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
