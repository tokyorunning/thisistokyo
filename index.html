        /**
         * Icon Wrapper: CDN Lucide 아이콘을 리액트에서 안전하게 사용
         */
        const Icon = ({ name, size = 24, className = "", color = "currentColor", fill = "none" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                const renderIcon = () => {
                    if (spanRef.current && window.lucide) {
                        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                        const svg = spanRef.current.querySelector('svg');
                        if (svg) {
                            svg.style.width = typeof size === 'number' ? `${size}px` : size;
                            svg.style.height = typeof size === 'number' ? `${size}px` : size;
                            svg.style.color = color;
                            svg.style.fill = fill;
                            if (className) svg.setAttribute('class', `inline-block align-middle ${className}`);
                        }
                    }
                };
                renderIcon();
                if (!window.lucide) {
                    const checkLucide = setInterval(() => {
                        if (window.lucide) { clearInterval(checkLucide); renderIcon(); }
                    }, 50);
                    return () => clearInterval(checkLucide);
                }
            }, [name, size, className, color, fill]);
            return <span ref={spanRef} style={{ display: 'inline-flex', verticalAlign: 'middle', justifyContent: 'center', alignItems: 'center' }}></span>;
        };

                adminOn: "🛠️ Admin Dashboard",
                adminOff: "🛠️ Logout",
                courseStats: { dist: "距離", diff: "難易度" },
                themes: { All: "すべて", City: "シティ", Nature: "自然", Park: "公園", Night: "ナイト", Training: "ロング", Morning: "朝", Race: "大会", Overseas: "海外" }
            }
        };

        // --- 별점 컴포넌트 ---
        const StarRating = ({ rating, size = 16, color = "text-orange-500" }) => (
            <div className="flex gap-0.5">
                {[1, 2, 3, 4, 5].map((s) => (
                    <Icon key={s} name="star" size={size} color={s <= rating ? "#f97316" : "#cbd5e1"} fill={s <= rating ? "#f97316" : "none"} />
                ))}
            </div>
        );

        const InteractiveStarRating = ({ rating, onChange, size = 24 }) => (
            <div className="flex gap-1 cursor-pointer">
                {[1, 2, 3, 4, 5].map((s) => (
                    <div key={s} onClick={() => onChange(s)} className="hover:scale-110 transition-transform">
                        <Icon name="star" size={size} color={s <= rating ? "#f97316" : "#475569"} fill={s <= rating ? "#f97316" : "none"} />
                    </div>
                ))}
            </div>
        );

        function App() {
            const [lang, setLang] = useState('ko');
            const [routes, setRoutes] = useState([]);
            const [selectedRoute, setSelectedRoute] = useState(null);
            const [activeFilter, setActiveFilter] = useState('All');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [shareMessage, setShareMessage] = useState('');
            const [scrolled, setScrolled] = useState(false);

            // 관리자 모드
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // 구글 지도
            const [googleApiKey, setGoogleApiKey] = useState('');
            const [isMapLoaded, setIsMapLoaded] = useState(false);
            const [mapError, setMapError] = useState('');

            // 데이터 상태
            const [notices, setNotices] = useState([{ text_ko: "데이터 로딩 중...", createdAt: new Date().toISOString() }]);
            const [isAddingNotice, setIsAddingNotice] = useState(false);
            const [newNoticeForm, setNewNoticeForm] = useState({ text_ko: '', text_ja: '' });
            const [youtubeUrl, setYoutubeUrl] = useState('');
            const [isFetchingInfo, setIsFetchingInfo] = useState(false);
            const [newRouteForm, setNewRouteForm] = useState({ title_ko: '', title_ja: '', location_ko: '', location_ja: '', description_ko: '', description_ja: '', lat: '', lng: '', videoId: '', thumbnail: '', themes: [], distance: '', difficulty: 3 });

            const mapRef = useRef(null);
            const googleMapInstance = useRef(null);
            const markersRef = useRef([]);
            const t = translations[lang];

            const handleCopyLink = () => {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    setShareMessage(t.copyLink + ' OK!');
                    setTimeout(() => setShareMessage(''), 2000);
                }).catch(err => {
                    console.error("Failed to copy link: ", err);
                });
            };

            // 1. Auth & Real-time Listeners (Rule 3)
            useEffect(() => {
                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Firebase Login Fail"); }

                    // Listeners
                    db.doc(SETTINGS_PATH).onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.notices && Array.isArray(data.notices)) {
                                setNotices(data.notices);
                            } else if (data.text_ko) { // Backward compatibility
                                setNotices([{ text_ko: data.text_ko, text_ja: data.text_ja, createdAt: data.createdAt }]);
                            }
                            if (data.mapsApiKey) setGoogleApiKey(data.mapsApiKey);
                        }
                    });
                    db.collection(ROUTES_PATH).onSnapshot(snap => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        data.sort((a, b) => new Date(b.date) - new Date(a.date)); // Rule 2: Memory Sort
                        setRoutes(data);
                    });
                };
                init();

                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            // 2. Map Script Loading (Depends on API Key & Language Toggle)
            useEffect(() => {
                if (!googleApiKey) return;

                // 1. Clean up existing map script and instance if it exists (for language switching)
                if (window.google && window.google.maps) {
                    const oldScripts = document.querySelectorAll('script[src*="maps.googleapis.com"]');
                    oldScripts.forEach(s => s.remove());
                    delete window.google;
                    setIsMapLoaded(false);
                    googleMapInstance.current = null;
                }

                // 2. Inject new script with current language parameter
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}&language=${lang}`;
                script.async = true;
                script.onload = () => setIsMapLoaded(true);
                script.onerror = () => setMapError("Google Maps Key Error");
                document.head.appendChild(script);

                return () => {
                    script.remove();
                };
            }, [googleApiKey, lang]);

            // 3. Map Instance
            useEffect(() => {
                if (isMapLoaded && mapRef.current && !googleMapInstance.current) {
                    googleMapInstance.current = new window.google.maps.Map(mapRef.current, {
                        center: { lat: 35.6895, lng: 139.6917 }, zoom: 9,
                        mapTypeControl: false, streetViewControl: false,
                    });
                }
            }, [isMapLoaded]);

            // 4. Markers
            useEffect(() => {
                if (googleMapInstance.current) {
                    markersRef.current.forEach(m => m.setMap(null));
                    markersRef.current = [];
                    routes.forEach(route => {
                        // Protect against missing themes array in old data
                        const themes = route.themes || [];
                        if (activeFilter !== 'All' && !themes.includes(activeFilter)) return;
                        const marker = new window.google.maps.Marker({
                            position: { lat: Number(route.lat), lng: Number(route.lng) },
                            map: googleMapInstance.current,
                            icon: { path: 0, scale: 10, fillColor: selectedRoute?.id === route.id ? "#fb923c" : "#3b82f6", fillOpacity: 1, strokeWeight: 3, strokeColor: "#ffffff" }
                        });
                        marker.addListener('click', () => setSelectedRoute(route));
                        markersRef.current.push(marker);
                    });
                }
            }, [routes, selectedRoute, activeFilter, isMapLoaded]);

            // 5. Preview Marker
            const previewMarkerRef = useRef(null);
            useEffect(() => {
                if (googleMapInstance.current && newRouteForm.lat && newRouteForm.lng) {
                    const lat = Number(newRouteForm.lat);
                    const lng = Number(newRouteForm.lng);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        if (!previewMarkerRef.current) {
                            previewMarkerRef.current = new window.google.maps.Marker({
                                map: googleMapInstance.current,
                                icon: { path: 0, scale: 12, fillColor: "#22c55e", fillOpacity: 1, strokeWeight: 4, strokeColor: "#ffffff" },
                                zIndex: 999
                            });
                        }
                        previewMarkerRef.current.setPosition({ lat, lng });
                        googleMapInstance.current.panTo({ lat, lng });
                        googleMapInstance.current.setZoom(14);
                    }
                } else if (previewMarkerRef.current) {
                    previewMarkerRef.current.setMap(null);
                    previewMarkerRef.current = null;
                }
            }, [newRouteForm.lat, newRouteForm.lng, isMapLoaded]);

            // --- Handlers ---
const handleLogin = async (e) => {
    e.preventDefault();
    try {
        await auth.signInWithEmailAndPassword(loginEmail, loginPassword);
        setIsAdmin(true);
        setShowLoginModal(false);
        setLoginError('');
    } catch (error) {
        setLoginError('이메일 또는 비밀번호가 올바르지 않습니다.');
        console.error('Login Error:', error);
                }
            };

            const handleFetchYT = async () => {
                if (!googleApiKey) return alert("API Key Required");
                setIsFetchingInfo(true);
                try {
                    const vid = youtubeUrl.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${vid}&key=${googleApiKey}`);
                    const data = await res.json();
                    const snippet = data.items[0].snippet;
                    const desc = snippet.description;
                    const coord = desc.match(/Coordinates:\s*(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)/i);
                    const dist = desc.match(/Distance:\s*([\d.]+\s*(?:km|m)?)/i);
                    const loc = desc.match(/Location:\s*(.+)/i);
                    setNewRouteForm({ ...newRouteForm, title_ko: snippet.title, title_ja: snippet.title, description_ko: desc, description_ja: desc, lat: coord?.[1] || "", lng: coord?.[3] || "", distance: dist?.[1] || "", location_ko: loc?.[1]?.trim() || "", location_ja: loc?.[1]?.trim() || "", videoId: vid, thumbnail: snippet.thumbnails?.high?.url });
                } catch (e) { alert("Fetch Fail"); } finally { setIsFetchingInfo(false); }
            };

            const handleThemeToggle = (themeKey) => {
                const currentThemes = newRouteForm.themes;
                if (currentThemes.includes(themeKey)) {
                    setNewRouteForm({ ...newRouteForm, themes: currentThemes.filter(t => t !== themeKey) });
                } else {
                    if (currentThemes.length >= 3) {
                        alert("최대 3개의 테마만 선택 가능합니다. (Max 3 themes allowed)");
                        return;
                    }
                    setNewRouteForm({ ...newRouteForm, themes: [...currentThemes, themeKey] });
                }
            };

            const handleAdd = async () => {
                if (!newRouteForm.lat || !newRouteForm.title_ko) return alert("Missing required fields (Coordinates or Title)");
                await db.collection(ROUTES_PATH).add({ ...newRouteForm, date: new Date().toISOString() });
                setNewRouteForm({ title_ko: '', title_ja: '', location_ko: '', location_ja: '', description_ko: '', description_ja: '', lat: '', lng: '', videoId: '', thumbnail: '', themes: [], distance: '', difficulty: 3 });
                setYoutubeUrl('');
            };

            const formatDate = (iso) => { if (!iso) return ""; const d = new Date(iso); return `${d.getFullYear()}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`; };
            const formatDateTime = (iso) => {
                if (!iso) return "";
                const d = new Date(iso);
                return `${d.getFullYear()}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            };
            const isNew = (iso) => (new Date() - new Date(iso)) / 86400000 <= 3;
            const filteredRoutes = activeFilter === 'All' ? routes : routes.filter(r => r.themes.includes(activeFilter));

            return (
                <div className="min-h-screen text-slate-800">
                    {/* Header */}
                    <header className={`fixed top-0 left-0 right-0 z-[100] transition-all duration-500 ${scrolled ? 'bg-slate-900/95 backdrop-blur-md shadow-xl h-16' : 'bg-slate-900 h-24'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                <div className="flex flex-col">
                                    <div className="flex items-end gap-2">
                                        <span className="font-black text-2xl text-white italic tracking-tighter uppercase leading-none">TOKYO <span className="text-orange-500">RUNNING.</span></span>
                                        <span className="bg-orange-600 text-white text-[10px] font-black uppercase px-2 py-0.5 rounded-md tracking-wider mb-0.5 animate-pulse">BETA</span>
                                    </div>
                                    <span className="text-[12px] font-black text-orange-500 tracking-widest mt-1 uppercase opacity-95">{t.heroSub}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex bg-white/5 p-1 rounded-full border border-white/10">
                                    <button onClick={() => setLang('ko')} className={`px-4 py-1.5 text-[10px] font-black rounded-full ${lang === 'ko' ? 'bg-orange-600 text-white' : 'text-slate-400'}`}>KOR</button>
                                    <button onClick={() => setLang('ja')} className={`px-4 py-1.5 text-[10px] font-black rounded-full ${lang === 'ja' ? 'bg-orange-600 text-white' : 'text-slate-400'}`}>JPN</button>
                                </div>
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-3 text-white bg-white/5 hover:bg-orange-600 border border-white/10 rounded-2xl transition-all outline-none shadow-inner">
                                    <Icon name={isMenuOpen ? "x" : "menu"} />
                                </button>
                            </div>
                            {isMenuOpen && (
                                <div className="absolute top-full right-6 w-60 bg-slate-900 border border-slate-800 shadow-2xl rounded-[2rem] py-6 mt-3 flex flex-col z-[200] animate-in fade-in slide-in-from-top-4">
                                    <div className="sm:hidden flex justify-center gap-2 mb-6 px-6">
                                        <button onClick={() => setLang('ko')} className="flex-1 py-2 text-[10px] font-black rounded-xl border border-slate-700 text-slate-300">KOREAN</button>
                                        <button onClick={() => setLang('ja')} className="flex-1 py-2 text-[10px] font-black rounded-xl border border-slate-700 text-slate-300">JAPANESE</button>
                                    </div>
                                    <a href="#map-section" onClick={() => setIsMenuOpen(false)} className="px-8 py-4 text-white text-[11px] font-black uppercase flex justify-between">Explore Map <Icon name="map" size={16} /></a>
                                    <a href="#videos" onClick={() => setIsMenuOpen(false)} className="px-8 py-4 text-white text-[11px] font-black uppercase flex justify-between">Video Archive <Icon name="play" size={16} /></a>
                                    <div className="h-px bg-slate-800 my-4 mx-8"></div>
                                    <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" className="px-8 py-4 text-red-500 text-[11px] font-black uppercase flex justify-between">Subscribe <Icon name="youtube" size={16} /></a>
                                    <button onClick={() => { if (isAdmin) setIsAdmin(false); else setShowLoginModal(true); setIsMenuOpen(false); }} className="px-8 py-4 text-slate-600 text-[10px] font-black uppercase text-left">{isAdmin ? t.adminOff : t.adminOn}</button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="pt-24">
                        {/* Immersive Full-Width Map */}
                        <section id="map-section" className="w-full h-[500px] md:h-[650px] bg-slate-900 relative border-b border-slate-200 overflow-hidden flex items-center justify-center">
                            {mapError ? (
                                <div className="text-center p-8"><Icon name="alert-triangle" className="text-red-500 mb-4" size={48} /><button onClick={() => { setMapError(''); setGoogleApiKey(''); }} className="px-8 py-3 bg-red-600 text-white font-bold rounded-2xl shadow-lg">Retry</button></div>
                            ) : isMapLoaded ? (
                                <div ref={mapRef} className="w-full h-full" />
                            ) : (
                                <div className="text-center"><Icon name="map" className="text-slate-700 animate-pulse mb-4" size={64} /><p className="text-xs font-black uppercase text-slate-600 tracking-[0.4em]">{t.mapLoading}</p></div>
                            )}
                            <div className="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-slate-950/40 to-transparent pointer-events-none"></div>
                        </section>

                        {/* Announcement History */}
                        <section className="max-w-7xl mx-auto px-6 mt-16 mb-16 space-y-4">

                                                    <svg viewBox="0 0 24 24" className="w-8 h-8 fill-current group-hover:scale-110 transition-transform"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.328 12.852c-.66.66-1.572 1.026-2.584 1.026-1.572 0-2.85-1.12-2.85-2.5 0-1.38 1.278-2.5 2.85-2.5.588 0 1.134.156 1.584.426.33.204.6.492.798.834.198.342.312.738.312 1.152 0 .09-.006.18-.018.27-.012.09-.03.18-.054.27-.15.54-.486 1.008-.948 1.326-.462.318-1.026.492-1.632.492-1.2 0-2.202-.756-2.616-1.8-.06-.15-.102-.312-.132-.48a3.34 3.34 0 01-.042-.51c0-1.842 1.494-3.33 3.336-3.33 1.038 0 1.968.474 2.58 1.218.156.192.282.408.378.636.096.228.15.474.15.726 0 1.122-.906 2.028-2.022 2.028a2.02 2.02 0 01-1.428-.594c-.114-.114-.216-.246-.3-.39-.084-.144-.144-.3-.18-.462-.036-.162-.054-.33-.054-.504 0-.744.606-1.35 1.35-1.35.342 0 .654.126.894.336.24.21.414.498.486.828l.006.012c.006.03.012.06.012.09 0 .156-.126.282-.282.282s-.282-.126-.282-.282l-.006-.036c-.036-.168-.138-.306-.27-.402-.132-.096-.3-.156-.48-.156-.414 0-.75.336-.75.75 0 .09.012.18.03.27.018.09.048.18.09.264.198.42.63.714 1.128.714.756 0 1.368-.612 1.368-1.368 0-.132-.018-.258-.054-.384-.036-.126-.096-.246-.174-.348-.372-.498-.954-.822-1.614-.822-1.128 0-2.046.918-2.046 2.046 0 .066.006.132.012.198.006.066.018.132.036.198.246.852 1.026 1.482 1.962 1.482.438 0 .84-.126 1.176-.348.336-.222.582-.546.696-.924.012-.042.024-.084.03-.126.006-.042.006-.084.006-.126 0-.216-.066-.42-.186-.588-.12-.168-.288-.288-.48-.348-.288-.09-.594-.138-.912-.138-2.046 0-3.708 1.662-3.708 3.708 0 .156.012.312.03.468.018.156.048.312.09.462.63 2.166 2.634 3.75 5.01 3.75 1.74 0 3.288-.84 4.26-2.124.234-.306.42-.642.552-.996.132-.354.198-.732.198-1.122 0-2.31-1.122-4.362-2.856-5.634l-.018-.012z" /></svg>

                        </div>
                    )}

                    {/* Admin Login Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md animate-in fade-in duration-300">
                            <div className="absolute inset-0" onClick={() => setShowLoginModal(false)}></div>
                            <form onSubmit={handleLogin} className="relative w-full max-w-md bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100 flex flex-col items-center animate-in zoom-in-95 duration-300">
                                <div className="w-20 h-20 bg-orange-100 text-orange-600 rounded-3xl flex items-center justify-center mb-6"><Icon name="lock" size={32} /></div>
                                <h2 className="text-3xl font-black text-slate-900 uppercase italic mb-2 leading-none">Admin Login</h2>
                                <p className="text-sm text-slate-500 font-bold mb-8 italic">관리자 대시보드 권한 인증</p>
                                <div className="w-full space-y-4 mb-8">
                                    <input type="email" required value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-orange-500 transition-all shadow-inner text-slate-950" placeholder="Email" />
                                    <input type="password" required value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-orange-500 transition-all shadow-inner text-slate-950" placeholder="Password" />
                                    {loginError && <p className="text-xs text-red-500 font-black uppercase tracking-widest">{loginError}</p>}
                                </div>
                                <button type="submit" className="w-full py-5 bg-slate-900 text-white font-black rounded-3xl text-lg uppercase italic tracking-tighter shadow-2xl active:scale-95 transition-all">Authorize Access</button>
                                <button type="button" onClick={() => setShowLoginModal(false)} className="mt-4 text-xs font-black text-slate-400 uppercase tracking-widest hover:text-slate-600">Cancel</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
