<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO RUNNING. - 도쿄를 달리고 기록합니다</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 지도 마커 및 폰트 미세 조정 */
        .gm-style-iw { border-radius: 20px !important; padding: 0 !important; }
        
        /* 애니메이션 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        /**
         * Icon 컴포넌트: CDN 환경에서 Lucide 아이콘을 안전하게 렌더링
         */
        const Icon = ({ name, size = 24, className = "", color = "currentColor", fill = "none" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i 
                data-lucide={name} 
                style={{ width: size, height: size, color: color, fill: fill }} 
                className={`inline-block ${className}`}
            ></i>;
        };

        const translations = {
            ko: {
                siteTitle: "도쿄를 달리는 남자",
                heroTitle: "TOKYO RUNNING.",
                heroSub: "도쿄를 달리고 기록합니다",
                mapLoading: "관리자 모드에서 API 키를 입력하면 실제 구글 지도가 렌더링됩니다.",
                announcement: "NOTICE",
                allCourses: "RUNNING ROUTES",
                courseSub: "테마별로 큐레이션된 도쿄의 러닝 코스",
                shareTitle: "SHARE THIS ROUTE",
                copyLink: "URL Copy",
                viewOnYoutube: "WATCH ON YOUTUBE",
                copied: "✅ URL이 클립보드에 복사되었습니다!",
                adminOn: "🛠️ Admin Dashboard",
                adminOff: "🛠️ Admin Logout",
                courseStats: { dist: "거리", diff: "난이도" },
                themes: { All: "전체", City: "시티", Nature: "자연", Park: "공원", Night: "야간", Training: "장거리", Morning: "아침", Race: "대회", Overseas: "해외" }
            },
            ja: {
                siteTitle: "東走男",
                heroTitle: "TOKYO RUNNING.",
                heroSub: "東京を走り、記録する",
                mapLoading: "管理者モードでAPIキーを入力すると、実際のGoogleマップが表示されます。",
                announcement: "お知らせ",
                allCourses: "RUNNING ROUTES",
                courseSub: "テーマ別に厳選された東京のランニングコース",
                shareTitle: "SHARE THIS ROUTE",
                copyLink: "URL Copy",
                viewOnYoutube: "YouTubeで視聴する",
                copied: "✅ URLをコピーしました!",
                adminOn: "🛠️ Admin Dashboard",
                adminOff: "🛠️ Logout",
                courseStats: { dist: "距離", diff: "難易度" },
                themes: { All: "すべて", City: "シティ", Nature: "自然", Park: "公園", Night: "ナイト", Training: "ロング", Morning: "朝", Race: "大会", Overseas: "海外" }
            }
        };

        const initialRoutes = [
            { id: 1, title_ko: "아라카와 강변 20km 롱런", title_ja: "荒川河川敷 20km ロングラン", location_ko: "도쿄도 기타구 (北구)", location_ja: "東京都北区", description_ko: "신호등이 없어 논스톱으로 달리기 좋은 최고의 평지 코스입니다.", description_ja: "信号がなくノンストップで走れる最高の平坦コースです。", difficulty: 2, distance: "20km", videoId: "dQw4w9WgXcQ", thumbnail: "https://images.unsplash.com/photo-1528629297340-d1d466945dc5?auto=format&fit=crop&q=80&w=600&h=400", themes: ["Nature", "Training"], date: "2024.03.15", lat: 35.7595, lng: 139.8239 },
            { id: 2, title_ko: "황거(고쿄) 야간 러닝", title_ja: "皇居ナイトランニング", location_ko: "도쿄도 치요다구 (千代田구)", location_ja: "東京都千代田区", description_ko: "도쿄 러너들의 성지! 안전하고 조명이 밝아 퇴근 후 야간 러닝으로 추천합니다.", description_ja: "東京ランナーの聖地！安全で照明が明るいため、仕事帰りに最適です。", difficulty: 3, distance: "5km", videoId: "dQw4w9WgXcQ", thumbnail: "https://images.unsplash.com/photo-1494522855154-9297ac14b55f?auto=format&fit=crop&q=80&w=600&h=400", themes: ["City", "Night"], date: "2024.02.28", lat: 35.6852, lng: 139.7528 }
        ];

        const StarRating = ({ rating, size = 16 }) => (
            <div className="flex gap-0.5">
                {[1, 2, 3, 4, 5].map((s) => (
                    <Icon key={s} name="star" size={size} color={s <= rating ? "#f97316" : "#cbd5e1"} fill={s <= rating ? "#f97316" : "none"} />
                ))}
            </div>
        );

        function App() {
            const [lang, setLang] = useState('ko');
            const [runningRoutes, setRunningRoutes] = useState(initialRoutes);
            const [selectedRoute, setSelectedRoute] = useState(null);
            const [activeFilter, setActiveFilter] = useState('All');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [shareMessage, setShareMessage] = useState('');
            const [scrolled, setScrolled] = useState(false);
            
            // 관리자 상태
            const [isAdmin, setIsAdmin] = useState(false); 
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // 구글 지도 상태
            const [googleApiKey, setGoogleApiKey] = useState('');
            const [isMapLoaded, setIsMapLoaded] = useState(false);
            const [mapError, setMapError] = useState('');

            const [announcement, setAnnouncement] = useState({ text_ko: "이번 주말은 아라카와 강변에서 20km 롱런 훈련 예정입니다! 🏃‍♂️💨", text_ja: "今週末は荒川河川敷で20kmロングランの予定です！🏃‍♂️💨", createdAt: new Date().toISOString() });
            const [isEditingAnnouncement, setIsEditingAnnouncement] = useState(false);
            const [editAnnouncementText, setEditAnnouncementText] = useState("");
            const [youtubeUrl, setYoutubeUrl] = useState('');
            const [isFetchingInfo, setIsFetchingInfo] = useState(false);
            const [newRouteForm, setNewRouteForm] = useState({ title: '', location: '', description: '', lat: '', lng: '', videoId: '', thumbnail: '', themes: [], distance: '', difficulty: 3 });

            const mapRef = useRef(null);
            const googleMapInstance = useRef(null);
            const markersRef = useRef([]);
            const t = translations[lang];

            // UI 상태 변화 시 아이콘 갱신 (메뉴 열림, 모달 열림 등)
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isMenuOpen, showLoginModal, selectedRoute, isAdmin]);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const formatDateTime = (iso) => {
                if (!iso) return "";
                const d = new Date(iso);
                return `${d.getFullYear()}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;
            };

            const isRecent = (iso) => (new Date() - new Date(iso)) / (1000 * 60 * 60 * 24) <= 3;

            // 구글 지도 로드
            useEffect(() => {
                if (googleApiKey && !isMapLoaded) {
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}`;
                    script.async = true;
                    script.onload = () => setIsMapLoaded(true);
                    script.onerror = () => setMapError("Google Maps Load Failed.");
                    document.head.appendChild(script);
                }
            }, [googleApiKey]);

            useEffect(() => {
                if (isMapLoaded && mapRef.current && !googleMapInstance.current) {
                    googleMapInstance.current = new window.google.maps.Map(mapRef.current, {
                        center: { lat: 35.6895, lng: 139.6917 },
                        zoom: 11,
                        styles: [
                            { featureType: "all", elementType: "labels.text.fill", stylers: [{ color: "#ffffff" }] },
                            { featureType: "landscape", elementType: "all", stylers: [{ color: "#242f3e" }] },
                            { featureType: "road", elementType: "all", stylers: [{ color: "#38414e" }] },
                            { featureType: "water", elementType: "all", stylers: [{ color: "#17263c" }] }
                        ],
                        mapTypeControl: false, streetViewControl: false,
                    });
                }
            }, [isMapLoaded]);

            useEffect(() => {
                if (googleMapInstance.current) {
                    markersRef.current.forEach(m => m.setMap(null));
                    markersRef.current = [];
                    runningRoutes.forEach(route => {
                        if (activeFilter !== 'All' && !route.themes.includes(activeFilter)) return;
                        const marker = new window.google.maps.Marker({
                            position: { lat: route.lat, lng: route.lng },
                            map: googleMapInstance.current,
                            icon: { 
                                path: window.google.maps.SymbolPath.CIRCLE, 
                                scale: 10, 
                                fillColor: selectedRoute?.id === route.id ? "#fb923c" : "#3b82f6", 
                                fillOpacity: 1, strokeWeight: 3, strokeColor: "#ffffff" 
                            }
                        });
                        marker.addListener('click', () => setSelectedRoute(route));
                        markersRef.current.push(marker);
                    });
                }
            }, [runningRoutes, selectedRoute, activeFilter]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginEmail === 'admin@thisistokyo.net' && loginPassword === '123456') {
                    setIsAdmin(true); setShowLoginModal(false); setLoginError('');
                } else {
                    setLoginError('계정 정보가 일치하지 않습니다.');
                }
            };

            const handleCopyLink = () => {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    setShareMessage(t.copied);
                    setTimeout(() => setShareMessage(''), 3000);
                });
            };

            const handleFetchYouTubeData = async () => {
                if (!googleApiKey) return alert("API 키를 입력하세요.");
                setIsFetchingInfo(true);
                try {
                    const videoId = youtubeUrl.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${googleApiKey}`);
                    const data = await res.json();
                    const snippet = data.items[0].snippet;
                    const desc = snippet.description;
                    const coordMatch = desc.match(/Coordinates:\s*(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)/i);
                    const distMatch = desc.match(/Distance:\s*([\d.]+\s*(?:km|m)?)/i);
                    setNewRouteForm({ ...newRouteForm, title: snippet.title, location: "Tokyo, Japan", description: desc, lat: coordMatch?.[1] || "", lng: coordMatch?.[3] || "", distance: distMatch?.[1] || "", videoId, thumbnail: snippet.thumbnails?.high?.url || "" });
                } catch (e) { alert("추출 실패"); } finally { setIsFetchingInfo(false); }
            };

            const filteredRoutes = activeFilter === 'All' ? runningRoutes : runningRoutes.filter(r => r.themes.includes(activeFilter));

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* Header */}
                    <header className={`fixed top-0 left-0 right-0 z-[100] transition-all duration-500 ${scrolled ? 'bg-slate-900/95 backdrop-blur-md shadow-xl h-16' : 'bg-slate-900 h-24'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between relative">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo({top:0, behavior:'smooth'})}>
                                <div className="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-700 rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg text-xl">東</div>
                                <div className="flex flex-col">
                                    <span className="font-black text-2xl text-white italic tracking-tighter uppercase leading-none">TOKYO <span className="text-orange-500">RUNNING.</span></span>
                                    <span className="text-[12px] font-black text-orange-500 tracking-widest mt-1 uppercase opacity-95">{t.heroSub}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex bg-white/5 p-1 rounded-full border border-white/10 backdrop-blur-md">
                                    <button onClick={() => setLang('ko')} className={`px-4 py-1.5 text-[10px] font-black rounded-full transition-all ${lang === 'ko' ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>KOR</button>
                                    <button onClick={() => setLang('ja')} className={`px-4 py-1.5 text-[10px] font-black rounded-full transition-all ${lang === 'ja' ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>JPN</button>
                                </div>
                                <button 
                                    onClick={(e) => { e.preventDefault(); setIsMenuOpen(!isMenuOpen); }} 
                                    className="p-3 text-white bg-white/5 hover:bg-orange-600 border border-white/10 rounded-2xl transition-all outline-none z-[110]"
                                >
                                    <Icon name={isMenuOpen ? "x" : "menu"} />
                                </button>
                            </div>

                            {/* Dropdown Menu */}
                            {isMenuOpen && (
                                <div className="absolute top-full right-6 w-60 bg-slate-900 border border-slate-800 shadow-2xl rounded-[2rem] py-6 mt-3 flex flex-col z-[105] animate-in fade-in slide-in-from-top-4">
                                    <div className="sm:hidden flex justify-center gap-2 mb-6 px-6">
                                        <button onClick={() => {setLang('ko'); setIsMenuOpen(false);}} className={`flex-1 py-2 text-[10px] font-black rounded-xl border ${lang === 'ko' ? 'bg-orange-600 border-orange-500 text-white' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>KOREAN</button>
                                        <button onClick={() => {setLang('ja'); setIsMenuOpen(false);}} className={`flex-1 py-2 text-[10px] font-black rounded-xl border ${lang === 'ja' ? 'bg-orange-600 border-orange-500 text-white' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>JAPANESE</button>
                                    </div>
                                    <a href="#map-section" onClick={()=>setIsMenuOpen(false)} className="px-8 py-4 hover:bg-white/5 text-[11px] font-black text-slate-300 hover:text-orange-400 transition-colors flex items-center justify-between uppercase tracking-widest">Explore Map <Icon name="map" size={16} className="opacity-40" /></a>
                                    <a href="#videos" onClick={()=>setIsMenuOpen(false)} className="px-8 py-4 hover:bg-white/5 text-[11px] font-black text-slate-300 hover:text-orange-400 transition-colors flex items-center justify-between uppercase tracking-widest">Video Archive <Icon name="play" size={16} className="opacity-40" /></a>
                                    <div className="h-px bg-slate-800 my-4 mx-8"></div>
                                    <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" rel="noreferrer" className="px-8 py-4 hover:bg-red-600/10 text-red-500 text-[11px] font-black uppercase tracking-widest flex items-center justify-between">Subscribe <Icon name="youtube" size={16} /></a>
                                    <button 
                                        onClick={() => { if (isAdmin) setIsAdmin(false); else setShowLoginModal(true); setIsMenuOpen(false); }} 
                                        className="px-8 py-4 text-slate-600 text-[10px] font-black uppercase tracking-widest text-left"
                                    >
                                        {isAdmin ? t.adminOff : t.adminOn}
                                    </button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="pt-16 sm:pt-24">
                        {/* Map Section (Full Width) */}
                        <section id="map-section" className="w-full h-[500px] md:h-[650px] bg-slate-900 border-b border-slate-200 relative overflow-hidden flex items-center justify-center">
                            {mapError ? (
                                <div className="text-center p-8 bg-slate-900">
                                    <Icon name="alert-triangle" className="text-red-500 mb-4" size={48} />
                                    <button onClick={() => {setMapError(''); setGoogleApiKey(''); setIsMapLoaded(false);}} className="px-8 py-3 bg-red-600 text-white font-bold rounded-2xl">Retry Setup</button>
                                </div>
                            ) : isMapLoaded ? (
                                <div ref={mapRef} className="w-full h-full" />
                            ) : (
                                <div className="flex flex-col items-center space-y-4">
                                    <Icon name="map" className="text-slate-700 animate-pulse" size={64} />
                                    <p className="text-xs font-black uppercase text-slate-600 tracking-[0.4em]">{t.mapLoading}</p>
                                </div>
                            )}
                        </section>

                        {/* Notice */}
                        <section className="max-w-7xl mx-auto px-6 mt-16 mb-16">
                            <div className="bg-white rounded-[2.5rem] p-6 flex items-center gap-6 shadow-xl border border-slate-100 relative overflow-hidden">
                                <div className="bg-orange-600 text-white p-4 rounded-3xl shadow-lg flex-shrink-0"><Icon name="megaphone" /></div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">{t.announcement}</span>
                                        <span className="text-[11px] text-slate-400 font-bold">{formatDateTime(announcement.createdAt)}</span>
                                        {isRecent(announcement.createdAt) && <span className="px-1.5 py-0.5 bg-red-600 text-white text-[9px] font-black rounded italic">NEW</span>}
                                    </div>
                                    {isEditingAnnouncement ? (
                                        <div className="flex gap-4">
                                            <input type="text" value={editAnnouncementText} onChange={(e)=>setEditAnnouncementText(e.target.value)} className="flex-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none" />
                                            <button onClick={()=>{setAnnouncement({...announcement, text_ko: editAnnouncementText}); setIsEditingAnnouncement(false);}} className="px-8 bg-slate-900 text-white font-black rounded-2xl">SAVE</button>
                                        </div>
                                    ) : (
                                        <p className="text-xl text-slate-900 font-black leading-tight tracking-tight">{lang === 'ko' ? announcement.text_ko : announcement.text_ja}</p>
                                    )}
                                </div>
                                {isAdmin && !isEditingAnnouncement && (
                                    <button onClick={()=>{setEditAnnouncementText(announcement.text_ko); setIsEditingAnnouncement(true);}} className="p-3 text-slate-300 hover:text-slate-900 transition-colors"><Icon name="edit-2" size={20}/></button>
                                )}
                            </div>
                        </section>

                        {/* Admin Tools */}
                        {isAdmin && (
                            <section className="max-w-7xl mx-auto px-6 pb-24 animate-in fade-in slide-in-from-top-4">
                                <div className="bg-slate-900 rounded-[3.5rem] p-10 sm:p-14 shadow-2xl border border-slate-800">
                                    <h2 className="text-4xl font-black text-white italic tracking-tighter mb-10 flex items-center gap-4 uppercase border-l-8 border-orange-600 pl-6 leading-none">Register New Route</h2>
                                    <div className="flex flex-col sm:flex-row gap-4 mb-12">
                                        <input type="text" placeholder="PASTE YOUTUBE URL" value={youtubeUrl} onChange={(e)=>setYoutubeUrl(e.target.value)} className="flex-1 p-6 bg-slate-800 border border-slate-700 rounded-3xl text-white font-bold outline-none focus:border-orange-600" />
                                        <button onClick={handleFetchYouTubeData} className="px-12 py-6 bg-orange-600 text-white font-black rounded-3xl uppercase italic shadow-xl hover:bg-orange-500 transition-all">Fetch Data</button>
                                    </div>
                                    {newRouteForm.title && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                            <div className="space-y-4">
                                                <input type="text" value={newRouteForm.title} onChange={(e)=>setNewRouteForm({...newRouteForm, title: e.target.value})} className="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white font-bold" />
                                                <input type="text" value={newRouteForm.distance} onChange={(e)=>setNewRouteForm({...newRouteForm, distance: e.target.value})} placeholder="Distance" className="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white font-bold" />
                                            </div>
                                            <button onClick={()=>{setRunningRoutes([{id: Date.now(), ...newRouteForm, title_ko: newRouteForm.title, themes: ["City"], date: "2026.03.07"}, ...runningRoutes]); alert("코스 등록 성공!");}} className="md:col-span-2 py-8 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-black rounded-[3rem] text-2xl uppercase italic tracking-tighter">Deploy to Map</button>
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}

                        {/* Gallery */}
                        <section id="videos" className="max-w-7xl mx-auto px-6 pb-32">
                            <div className="flex flex-col lg:flex-row lg:items-end justify-between mb-16 gap-10 border-b-8 border-slate-900 pb-12">
                                <div><h2 className="text-6xl font-black text-slate-900 tracking-tighter italic uppercase leading-none">{t.allCourses}</h2><p className="text-2xl font-bold text-slate-400 mt-4 tracking-tight">{t.courseSub}</p></div>
                                <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                                    {Object.keys(t.themes).map(key => (
                                        <button key={key} onClick={() => setActiveFilter(key)} className={`px-7 py-3 rounded-full text-[11px] font-black transition-all border-2 whitespace-nowrap uppercase tracking-widest ${activeFilter === key ? 'bg-slate-900 border-slate-900 text-white shadow-2xl scale-105' : 'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}>{t.themes[key]}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-16">
                                {filteredRoutes.map((route) => (
                                    <div key={route.id} onClick={() => setSelectedRoute(route)} className="group cursor-pointer">
                                        <div className="relative aspect-[3/4] rounded-[2.5rem] overflow-hidden mb-6 bg-slate-200 shadow-2xl transition-all duration-700 group-hover:-translate-y-4 border border-slate-100">
                                            <img src={route.thumbnail} className="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale group-hover:grayscale-0" />
                                            <div className="absolute top-6 left-6 flex flex-col gap-2">
                                                {route.themes.map(th => <span key={th} className="px-3 py-1 bg-white/95 backdrop-blur text-slate-950 text-[10px] font-black rounded-xl uppercase shadow-xl tracking-widest">#{translations[lang].themes[th]}</span>)}
                                            </div>
                                            <div className="absolute inset-0 bg-orange-600/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-all duration-500 shadow-2xl"><Icon name="play" className="text-slate-950 ml-1" /></div>
                                            </div>
                                        </div>
                                        <div className="px-2 space-y-3">
                                            <div className="flex items-center justify-between text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]"><span>{route.date}</span><span className="text-orange-600 bg-orange-50 px-2 py-0.5 rounded-lg">{route.distance}</span></div>
                                            <h3 className="text-2xl font-black text-slate-900 group-hover:text-orange-600 transition-colors leading-tight tracking-tighter uppercase italic">{lang === 'ko' ? route.title_ko : route.title_ja}</h3>
                                            <div className="flex justify-between items-center"><p className="text-xs text-slate-500 font-bold uppercase tracking-widest flex items-center gap-2"><Icon name="map-pin" size={14} className="text-orange-600" /> {lang === 'ko' ? route.location_ko : route.location_ja}</p><StarRating rating={route.difficulty} size={10} /></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-white py-24 px-10 border-t-[12px] border-orange-600">
                        <div className="max-w-7xl mx-auto flex flex-col items-center gap-12 text-center">
                            <a href="https://www.youtube.com/channel/UCdOIWYsJzkYiN5f0AmPSy_g" target="_blank" rel="noreferrer" className="w-20 h-20 bg-white/5 rounded-[2rem] flex items-center justify-center hover:bg-red-600 transition-all shadow-2xl border border-white/10 group"><Icon name="youtube" size={32} /></a>
                            <h2 className="text-5xl font-black tracking-tighter italic uppercase leading-none">TOKYO <span className="text-orange-600">RUNNING.</span></h2>
                            <p className="text-slate-500 font-black text-sm uppercase tracking-[0.4em] opacity-60">도쿄를 달리고 기록합니다</p>
                            <p className="text-[11px] text-slate-700 font-black tracking-[0.4em] uppercase opacity-50">©도쿄를 달리는 남자 ALL RIGHTS RESERVED.</p>
                        </div>
                    </footer>

                    {/* Detail Modal */}
                    {selectedRoute && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-3xl">
                            <div className="absolute inset-0" onClick={()=>setSelectedRoute(null)}></div>
                            <div className="relative w-full max-w-7xl bg-white rounded-[4rem] overflow-hidden shadow-2xl flex flex-col lg:flex-row max-h-[92vh] border border-white/20 animate-fade-in">
                                <button onClick={()=>setSelectedRoute(null)} className="absolute top-8 right-8 z-50 w-16 h-16 bg-white text-slate-950 rounded-full flex items-center justify-center transition-all shadow-2xl border border-slate-100 group">
                                    <Icon name="x" size={32} className="group-hover:rotate-90 transition-transform" />
                                </button>
                                <div className="w-full lg:w-3/5 bg-slate-950 relative overflow-hidden group">
                                    <img src={selectedRoute.thumbnail} className="w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-[6s]" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-white text-center pointer-events-none">
                                        <div className="w-32 h-32 bg-red-600 rounded-full flex items-center justify-center shadow-2xl mb-10"><Icon name="play" size={48} className="ml-2" /></div>
                                        <h4 className="text-xl font-black tracking-[0.5em] uppercase opacity-60 italic">Digital Archive Stream</h4>
                                    </div>
                                    <div className="absolute bottom-12 left-12 flex gap-10">
                                        <div className="flex items-center gap-3"><div className="w-12 h-12 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center"><Icon name="navigation" className="text-orange-500" /></div><div><p className="text-[10px] font-black text-white/50 uppercase tracking-widest mb-1">{t.courseStats.dist}</p><p className="text-xl font-black text-white">{selectedRoute.distance}</p></div></div>
                                        <div className="flex items-center gap-3"><div className="w-12 h-12 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center"><Icon name="gauge" className="text-orange-500" /></div><div><p className="text-[10px] font-black text-white/50 uppercase tracking-widest mb-1">{t.courseStats.diff}</p><StarRating rating={selectedRoute.difficulty} size={14} /></div></div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-2/5 p-12 lg:p-20 overflow-y-auto bg-white flex flex-col">
                                    <div className="mb-10 flex flex-wrap gap-3">{selectedRoute.themes.map(th => <span key={th} className="px-4 py-1.5 bg-slate-900 text-white text-[10px] font-black rounded-xl uppercase tracking-[0.2em] shadow-lg">#{translations[lang].themes[th]}</span>)}</div>
                                    <h2 className="text-3xl sm:text-4xl lg:text-5xl font-black text-slate-950 mb-6 leading-[0.85] tracking-tighter uppercase">{lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}</h2>
                                    <div className="flex items-center gap-3 text-slate-400 font-black text-sm mb-14 uppercase tracking-[0.3em]"><Icon name="map-pin" size={20} className="text-orange-600" /> {lang === 'ko' ? selectedRoute.location_ko : selectedRoute.location_ja}</div>
                                    <div className="relative p-12 bg-slate-50 rounded-[3.5rem] mb-16 border border-slate-100 shadow-inner"><p className="text-2xl font-bold text-slate-700 italic leading-tight">"{lang === 'ko' ? selectedRoute.description_ko : selectedRoute.description_ja}"</p></div>
                                    <div className="mt-auto space-y-8">
                                        <a href={`https://www.youtube.com/watch?v=${selectedRoute.videoId}`} target="_blank" className="w-full flex items-center justify-center gap-5 py-8 bg-red-600 text-white rounded-[2.5rem] font-black text-2xl uppercase active:scale-95 shadow-2xl italic tracking-tighter">WATCH FULL REPORT</a>
                                        <div className="pt-12 border-t-2 border-slate-100 text-left">
                                            <div className="flex items-center justify-between mb-8"><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">{t.shareTitle}</h3>{shareMessage && <span className="text-xs text-orange-600 font-black animate-pulse">{shareMessage}</span>}</div>
                                            <div className="flex gap-4">
                                                <button onClick={handleCopyLink} className="flex-1 flex items-center justify-center gap-4 py-6 bg-slate-100 text-slate-950 rounded-[2.5rem] text-[11px] font-black uppercase tracking-[0.2em] transition-all hover:bg-slate-200"><Icon name="link" size={20} className="text-orange-500" /> {t.copyLink}</button>
                                                <a href={`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(`[TOKYO RUNNING] ${lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}`)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-[#1DA1F2] text-white rounded-[2.5rem] hover:bg-[#1a8cd8] shadow-2xl active:rotate-12"><Icon name="twitter" size={28} fill="currentColor" /></a>
                                                <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-[#1877F2] text-white rounded-[2.5rem] hover:opacity-90 shadow-2xl"><Icon name="facebook" size={28} fill="currentColor" /></a>
                                                <a href={`https://www.threads.net/intent/post?text=${encodeURIComponent(`[TOKYO RUNNING] ${lang === 'ko' ? selectedRoute.title_ko : selectedRoute.title_ja}\n${window.location.href}`)}`} target="_blank" className="flex items-center justify-center w-24 h-24 bg-black text-white rounded-[2.5rem] hover:opacity-80 shadow-2xl border border-white/10 group">
                                                    <svg viewBox="0 0 24 24" className="w-8 h-8 fill-current group-hover:scale-110 transition-transform"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.328 12.852c-.66.66-1.572 1.026-2.584 1.026-1.572 0-2.85-1.12-2.85-2.5 0-1.38 1.278-2.5 2.85-2.5.588 0 1.134.156 1.584.426.33.204.6.492.798.834.198.342.312.738.312 1.152 0 .09-.006.18-.018.27-.012.09-.03.18-.054.27-.15.54-.486 1.008-.948 1.326-.462.318-1.026.492-1.632.492-1.2 0-2.202-.756-2.616-1.8-.06-.15-.102-.312-.132-.48a3.34 3.34 0 01-.042-.51c0-1.842 1.494-3.33 3.336-3.33 1.038 0 1.968.474 2.58 1.218.156.192.282.408.378.636.096.228.15.474.15.726 0 1.122-.906 2.028-2.022 2.028a2.02 2.02 0 01-1.428-.594c-.114-.114-.216-.246-.3-.39-.084-.144-.144-.3-.18-.462-.036-.162-.054-.33-.054-.504 0-.744.606-1.35 1.35-1.35.342 0 .654.126.894.336.24.21.414.498.486.828l.006.012c.006.03.012.06.012.09 0 .156-.126.282-.282.282s-.282-.126-.282-.282l-.006-.036c-.036-.168-.138-.306-.27-.402-.132-.096-.3-.156-.48-.156-.414 0-.75.336-.75.75 0 .09.012.18.03.27.018.09.048.18.09.264.198.42.63.714 1.128.714.756 0 1.368-.612 1.368-1.368 0-.132-.018-.258-.054-.384-.036-.126-.096-.246-.174-.348-.372-.498-.954-.822-1.614-.822-1.128 0-2.046.918-2.046 2.046 0 .066.006.132.012.198.006.066.018.132.036.198.246.852 1.026 1.482 1.962 1.482.438 0 .84-.126 1.176-.348.336-.222.582-.546.696-.924.012-.042.024-.084.03-.126.006-.042.006-.084.006-.126 0-.216-.066-.42-.186-.588-.12-.168-.288-.288-.48-.348-.288-.09-.594-.138-.912-.138-2.046 0-3.708 1.662-3.708 3.708 0 .156.012.312.03.468.018.156.048.312.09.462.63 2.166 2.634 3.75 5.01 3.75 1.74 0 3.288-.84 4.26-2.124.234-.306.42-.642.552-.996.132-.354.198-.732.198-1.122 0-2.31-1.122-4.362-2.856-5.634l-.018-.012z"/></svg>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Login Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md animate-in fade-in duration-300 text-center">
                            <div className="absolute inset-0" onClick={()=>setShowLoginModal(false)}></div>
                            <form onSubmit={handleLogin} className="relative w-full max-w-md bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100 flex flex-col items-center">
                                <div className="w-20 h-20 bg-orange-100 text-orange-600 rounded-3xl flex items-center justify-center mb-6"><Icon name="lock" size={32} /></div>
                                <h2 className="text-3xl font-black text-slate-900 uppercase italic mb-2">Admin Login</h2>
                                <p className="text-sm text-slate-500 font-bold mb-8 italic">관리자 계정으로 로그인하세요.</p>
                                <div className="w-full space-y-4 mb-8">
                                    <input type="email" required value={loginEmail} onChange={(e)=>setLoginEmail(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-orange-500 transition-all" placeholder="admin@thisistokyo.net" />
                                    <input type="password" required value={loginPassword} onChange={(e)=>setLoginPassword(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-orange-500 transition-all" placeholder="Password" />
                                    {loginError && <p className="text-xs text-red-500 font-black uppercase tracking-widest">{loginError}</p>}
                                </div>
                                <button type="submit" className="w-full py-5 bg-slate-900 text-white font-black rounded-3xl text-lg uppercase italic tracking-tighter shadow-2xl active:scale-95 transition-all">Authorize Access</button>
                                <button type="button" onClick={()=>setShowLoginModal(false)} className="mt-4 text-xs font-black text-slate-400 uppercase tracking-widest hover:text-slate-600">Cancel</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
